services:
  web:
    build:
      context: frontend
    environment:
      - REACT_APP_API_URL=http://188.40.180.113:3001
    ports:
      - 3000:3000
  api:
    build:
      context: backend
    ports:
      - 3001:3001
    environment:
      - DB_URL=mongodb://admin:pass123@db:27017/?authSource=admin
    restart: always
    depends_on:
      - db
    command: ["node", "index.js"]
  db:
    image: mongo:4.4
    ports:
      - 27017:27017
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=pass123
    volumes:
      - mongodb-sarvin:/data/db
  mongoExpress:
    image: mongo-express
    ports:
      - 8081:8081
    environment:
      - ME_CONFIG_BASICAUTH_USERNAME=sarvin
      - ME_CONFIG_BASICAUTH_PASSWORD=sarvinpass
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=pass123
      - ME_CONFIG_MONGODB_SERVER=db
    depends_on:
      - db
volumes:
  mongodb-sarvin:




