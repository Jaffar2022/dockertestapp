version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
    container_name: react-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:3001
    networks:
      - mongo-network

  python-backend:
    build:
      context: ./python-backend
    container_name: fastapi-backend
    ports:
      - "3001:3001"
    environment:
      - DB_URL=mongodb://admin:12345@mongodb:27017/?authSource=admin
      - DB_NAME=user_db
    networks:
      - mongo-network

networks:
  mongo-network:
    external: true